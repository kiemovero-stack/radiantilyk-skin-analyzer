// Capacitor plugin settings - using local libs for standalone Android Studio builds
include ':capacitor-android'
project(':capacitor-android').projectDir = new File('./libs/capacitor-android')

include ':capacitor-browser'
project(':capacitor-browser').projectDir = new File('./libs/capacitor-browser')

include ':capacitor-splash-screen'
project(':capacitor-splash-screen').projectDir = new File('./libs/capacitor-splash-screen')

include ':capacitor-status-bar'
project(':capacitor-status-bar').projectDir = new File('./libs/capacitor-status-bar')
