<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Google Fonts: Cormorant Garamond (luxury headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- Default title (overridden by client-side script for client domain) -->
    <title>Radiantilyk Aesthetic</title>

    <!-- Client-side domain detection: set correct meta tags before render -->
    <script>
      (function() {
        var host = window.location.hostname.toLowerCase();
        var staffDomains = ['rkaaiskin.com', 'www.rkaaiskin.com', 'rkaaiskin.manus.space'];
        var isStaff = staffDomains.indexOf(host) !== -1;

        // For localhost / dev: check for /__client path or cookie
        if (!isStaff && (host === 'localhost' || host === '127.0.0.1' || host.indexOf('manus.computer') !== -1)) {
          var hasClientCookie = document.cookie.indexOf('client_mode=1') !== -1;
          var isClientPath = window.location.pathname.indexOf('/__client') === 0;
          if (isClientPath) {
            document.cookie = 'client_mode=1;path=/';
            var clean = window.location.pathname.replace('/__client', '') || '/';
            window.location.replace(clean);
            return;
          }
          isStaff = !hasClientCookie;
        }

        window.__IS_CLIENT_SITE__ = !isStaff;

        if (!isStaff) {
          // Client domain: update meta tags for SEO
          document.title = 'RadiantilyK Aesthetic — AI Skin Analysis';
          var meta;
          meta = document.createElement('meta');
          meta.name = 'description';
          meta.content = 'Get your free AI-powered skin analysis from RadiantilyK Aesthetic. Personalized treatment recommendations for facials, injectables, laser treatments, and more. Serving San Jose & San Mateo.';
          document.head.appendChild(meta);
          meta = document.createElement('meta');
          meta.name = 'keywords';
          meta.content = 'skin analysis, AI skin analyzer, facials, injectables, Botox, fillers, laser treatment, microneedling, San Jose, San Mateo, RadiantilyK';
          document.head.appendChild(meta);
          // Mark the HTML element
          document.documentElement.setAttribute('data-client-mode', 'true');
        } else {
          // Staff domain: prevent search engines from indexing
          var meta = document.createElement('meta');
          meta.name = 'robots';
          meta.content = 'noindex, nofollow, noarchive, nosnippet, noimageindex';
          document.head.appendChild(meta);
          meta = document.createElement('meta');
          meta.name = 'googlebot';
          meta.content = 'noindex, nofollow, noarchive, nosnippet';
          document.head.appendChild(meta);
        }
      })();
    </script>

    <!-- Facebook Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      var pixelId = '%VITE_FB_PIXEL_ID%';
      if (pixelId && pixelId !== '' && !pixelId.includes('VITE_FB_PIXEL_ID')) {
        fbq('init', pixelId);
        fbq('track', 'PageView');
      }
    </script>
    <noscript>
      <img height="1" width="1" style="display:none"
        src="https://www.facebook.com/tr?id=%VITE_FB_PIXEL_ID%&ev=PageView&noscript=1"/>
    </noscript>
    <!-- End Facebook Pixel Code -->
  </head>

  <body>
    <div id="root"></div>

    <!--
      Dynamic entry point: loads main.tsx (staff) or client-main.tsx (client)
      based on the domain detection done above.
      In dev mode, Vite serves these as raw .tsx files.
      In production, Vite builds both entry points and the correct one is loaded.
    -->
    <script type="module">
      if (window.__IS_CLIENT_SITE__) {
        import('/src/client-main.tsx');
      } else {
        import('/src/main.tsx');
      }
    </script>

    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
